<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>무신사 수금 현황 (보호됨)</title>
<style>
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; font-family:'Pretendard','Helvetica Neue',-apple-system,sans-serif; }
  #gate { min-height:100%; display:flex; align-items:center; justify-content:center; background:#f4f4f5; padding:24px; }
  .box { width:100%; max-width:340px; background:#fff; border:1px solid #e0e0e0; border-radius:10px; padding:28px 22px; box-shadow:0 6px 24px rgba(0,0,0,.08); }
  .lock { font-size:30px; text-align:center; margin-bottom:10px; }
  h1 { font-size:16px; margin:0 0 4px; text-align:center; color:#1a1a1a; }
  p.sub { font-size:12px; color:#777; text-align:center; margin:0 0 18px; }
  input { width:100%; font-size:16px; padding:12px 14px; border:1.5px solid #d0d0d0; border-radius:8px; outline:none; }
  input:focus { border-color:#1a1a1a; }
  button { width:100%; margin-top:12px; font-size:15px; font-weight:600; padding:12px; border:0; border-radius:8px; background:#1a1a1a; color:#fff; cursor:pointer; }
  button:disabled { opacity:.5; }
  .err { color:#c0392b; font-size:12px; margin-top:10px; min-height:16px; text-align:center; }
  .caps { display:none; align-items:center; justify-content:center; gap:5px; margin-top:10px; font-size:12px; color:#92400e; background:#fef6e0; border:1px solid #f3d98a; border-radius:7px; padding:7px 10px; }
  .caps.on { display:flex; }
  .caps svg { flex:0 0 auto; }
  iframe { border:0; width:100%; height:100vh; display:block; }
  /* iframe 높이를 실제 보이는 영역(dvh)으로 제한 → 내부 '맨위로' 버튼이 모바일 하단 툴바 뒤로 잘리지 않음 */
  @supports (height:100dvh){ iframe { height:100dvh; } }
  #frameWrap { display:none; }
  .pwwrap { position:relative; }
  .pwwrap input { padding-right:46px; }
  #eye { position:absolute; top:0; right:0; height:100%; width:44px; margin:0; padding:0; background:transparent; color:#888; font-size:18px; font-weight:400; box-shadow:none; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  #eye:hover { color:#1a1a1a; }
</style>
</head>
<body>
<div id="gate">
  <div class="box">
    <div class="lock">🔒</div>
    <h1>무신사 수금 현황</h1>
    <p class="sub">열람 비밀번호를 입력하세요</p>
    <form id="f">
      <div class="pwwrap">
        <input id="pw" type="password" inputmode="text" autocomplete="off" placeholder="비밀번호" autofocus>
        <button id="eye" type="button" aria-label="비밀번호 표시" title="비밀번호 표시">👁</button>
      </div>
      <div class="caps" id="caps"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 8l-6 6h4v3h4v-3h4z"/><line x1="6" y1="20" x2="18" y2="20"/></svg><span>Caps Lock이 켜져 있습니다</span></div>
      <button id="go" type="submit">열기</button>
      <div class="err" id="err"></div>
    </form>
  </div>
</div>
<div id="frameWrap"><iframe id="frame" title="대시보드"></iframe></div>

    { name:'PBKDF2', salt:b64(ENC.salt), iterations:ENC.iter, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']
  );
  const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(ENC.iv) }, key, b64(ENC.data));
  return new TextDecoder().decode(plain);
}
(function(){
  var eye=document.getElementById('eye'), pw=document.getElementById('pw');
  if(eye&&pw){ eye.addEventListener('click', function(){
    var show = pw.type==='password';
    pw.type = show ? 'text' : 'password';
    eye.textContent = show ? '🙈' : '👁';
    var label = show ? '비밀번호 숨기기' : '비밀번호 표시';
    eye.setAttribute('aria-label', label); eye.title = label;
    pw.focus();
  }); }
})();
// Caps Lock 감지 — 비밀번호 입력 중 캡스락이 켜져 있으면 경고 표시
(function(){
  var pw=document.getElementById('pw'), caps=document.getElementById('caps');
  if(!pw||!caps) return;
  function check(e){
    if(typeof e.getModifierState!=='function') return;
    caps.classList.toggle('on', e.getModifierState('CapsLock'));
  }
  pw.addEventListener('keydown', check);
  pw.addEventListener('keyup', check);
  pw.addEventListener('blur', function(){ caps.classList.remove('on'); });
})();
// iframe 높이를 실제 보이는 뷰포트에 맞춰 내부 '맨위로' 버튼이 하단 툴바에 가리지 않게 함
function sizeFrame(){
  var f=document.getElementById('frame');
  if(!f || document.getElementById('frameWrap').style.display==='none') return;
  var h=(window.visualViewport && window.visualViewport.height) ? window.visualViewport.height : window.innerHeight;
  f.style.height=h+'px';
}
window.addEventListener('resize', sizeFrame);
if(window.visualViewport){ window.visualViewport.addEventListener('resize', sizeFrame); window.visualViewport.addEventListener('scroll', sizeFrame); }
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err'); const go = document.getElementById('go');
  err.textContent=''; go.disabled=true; go.textContent='여는 중...';
  try {
    const html = await unlock(document.getElementById('pw').value);
    document.getElementById('gate').style.display='none';
    const wrap = document.getElementById('frameWrap'); wrap.style.display='block';
    document.getElementById('frame').srcdoc = html;
    sizeFrame();
  } catch(_) {
    err.textContent='비밀번호가 올바르지 않습니다.';
    go.disabled=false; go.textContent='열기';
  }
});
