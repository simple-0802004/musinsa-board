<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>무신사스탠다드 매장별 진행현황 (보호됨)</title>
<style>
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; font-family:'Pretendard','Helvetica Neue',-apple-system,sans-serif; }
  #gate { min-height:100%; display:flex; align-items:center; justify-content:center; background:#f4f4f5; padding:24px; }
  .box { width:100%; max-width:340px; background:#fff; border:1px solid #e0e0e0; border-radius:10px; padding:28px 22px; box-shadow:0 6px 24px rgba(0,0,0,.08); }
  .lock { font-size:30px; text-align:center; margin-bottom:10px; }
  h1 { font-size:16px; margin:0 0 4px; text-align:center; color:#1a1a1a; }
  p.sub { font-size:12px; color:#777; text-align:center; margin:0 0 18px; }
  input { width:100%; font-size:16px; padding:12px 14px; border:1.5px solid #d0d0d0; border-radius:8px; outline:none; }
  input:focus { border-color:#1a1a1a; }
  button { width:100%; margin-top:12px; font-size:15px; font-weight:600; padding:12px; border:0; border-radius:8px; background:#1a1a1a; color:#fff; cursor:pointer; }
  button:disabled { opacity:.5; }
  .err { color:#c0392b; font-size:12px; margin-top:10px; min-height:16px; text-align:center; }
  iframe { border:0; width:100%; height:100vh; display:block; }
  #frameWrap { display:none; }
.pwwrap{position:relative}
.pwwrap input{padding-right:46px;box-sizing:border-box;width:100%}
#pwtoggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:auto;margin:0;border:none;background:none;cursor:pointer;padding:6px;opacity:.5;display:flex;align-items:center;border-radius:6px}
#pwtoggle:hover{opacity:1}
</style>
</head>
<body>
<div id="gate">
  <div class="box">
    <div class="lock">🔒</div>
    <h1>무신사스탠다드 매장별 진행현황</h1>
    <p class="sub">열람 비밀번호를 입력하세요</p>
    <form id="f">
      <div class="pwwrap"><input id="pw" type="password" inputmode="text" autocomplete="current-password" placeholder="비밀번호" autofocus><button type="button" id="pwtoggle" aria-label="비밀번호 표시" title="비밀번호 표시"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
      <label id="rememberLabel" style="display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:#777;margin-top:10px;margin-bottom:2px;cursor:pointer"><input type="checkbox" id="remember" style="width:auto;margin:0">이 기기에서 비밀번호 기억</label>
      <button id="go" type="submit">열기</button>
      <div class="err" id="err"></div>
    </form>
  </div>
</div>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(pw){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:b64(ENC.salt), iterations:ENC.iter, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']
  );
  const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(ENC.iv) }, key, b64(ENC.data));
  return new TextDecoder().decode(plain);
}
async function doUnlock(pw, remember){
  const err = document.getElementById('err'); const go = document.getElementById('go');
  err.textContent=''; go.disabled=true; go.textContent='여는 중...';
  try {
    const html = await unlock(pw);
    try { if(remember) localStorage.setItem('mb_pw', pw); else localStorage.removeItem('mb_pw'); } catch(_){}
    document.getElementById('gate').style.display='none';
    document.getElementById('frameWrap').style.display='block';
    document.getElementById('frame').srcdoc = html;
  } catch(_) {
    try { localStorage.removeItem('mb_pw'); } catch(__){}
    err.textContent='비밀번호가 올바르지 않습니다.';
    go.disabled=false; go.textContent='열기';
  }
}
document.getElementById('f').addEventListener('submit', function(e){ e.preventDefault(); doUnlock(document.getElementById('pw').value, document.getElementById('remember').checked); });
(function(){ try { var saved = localStorage.getItem('mb_pw'); if (saved) { document.getElementById('pw').value = saved; document.getElementById('remember').checked = true; doUnlock(saved, true); } } catch(_){} })();
